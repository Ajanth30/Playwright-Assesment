name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
    - name: Run Playwright tests
      run: npx playwright test
      env:
        BASE_URL: https://fakestoreapi.com
        CURA_BASE_URL: https://katalon-demo-cura.herokuapp.com
        API_USERNAME: johnd
        API_PASSWORD: m38rmF$
        # jsonplaceholder is a reliable public stub; used by the e2e apiClient
        # fixture so the smoke test doesn't depend on fakestoreapi uptime.
        E2E_API_BASE_URL: https://jsonplaceholder.typicode.com
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
